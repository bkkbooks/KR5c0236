front:
  text: 三洞樞機雜說臨四
  hash: sha256:40026bbf6c591f5e5d4f3a7693aa2470768780d7142f18155e0da1e8951293ee
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0236_HFL_000-001a, image: hfl/0572/0572-124.png}
body:
  text: 日用導引神仙初地門每朝凌晨或五更初澄心靜慮握固存神端嚴敷坐屏絶緣務寂無思念想身於無身之中存心於無為之境是以和氣聿然自至即便叩齒七通咽液七數度度想液直至下丹田日久成賣也然後舒展體骨為十二般導引一通百關兩手攀兩腳頭三度三度咽的不得出氣二左推右推以一手串腳脛攀腳面又一手推腳肚如此互摤以三為度度度咽納三單展足以一手托林一手攀腳頭如此互幾各三數度度咽納四雙攀足以兩手攀一腳如此至换三度度度咽納五左右托空以兩手鎖鎖擺出其肘緩緩解散一手攀乳傍一手托虛空想如推重物如此互換以三為數度度咽納六托天據地以兩手相鎖互仰托天緩緩和頭向前可去地一二寸許亦以三為數度度咽納七龍盤凰嘴以左手串入右手互把其腕手頭柱嘴如此互換以三為數度度咽紈八鳯凰展翼兩手先擺後以凰翼長却向前如此互換三度度度咽納九左擺右擺以兩手相鎖抱頭面左擺右擺以三為數度度咽納十推東推西以兩手相鎖托前擺束擺西以三為數度度咽納十一擊天門以兩手相鎖摩鼻每七摩為一度咽納一咽如此亦以三七二十一咽為足十二仙人乾浴以兩手相據似有熱氣便摩兩目以至於面部兩耳項時一如澡洗法唯多為妙巳上日用導引雖云凌晨亦不拘早晚但無事常習自然手熟筋軟骨壯氣和有疾除疾無疾爽神食飽消食餒過止飢一切作為並無所礙雖未可以長生久視亦且除身中浮疾諺云縱然不得力猶勝別勞心此之謂也啄咽按摩法真誥云夜行常當啄齒啄齒亦無止限數殺鬼邪鬼常畏齒聲是故不得犯人若兼以漱液祝說亦善也仙人劉京語皇甫隆曰夫朝睡起未澡洗之前安坐漱口中唾曰玉泉令滿口咽之即叩齒二七止又更漱唾如前又叩齒一如上法夫叩齒者召身內神令安之也又今人齒不朽咽液者令人身體光潤力壯有顔色去三尸蟲名曰錬精使人長生若能終身行之得仙也真誥太素丹景經曰一面之上欲常得兩手摩拭之熱髙下隨形皆使極幣令人面有光澤皺斑不生行之五年色如少女先當切摩兩掌令熱然後拭面目順手摩髮如理櫛之狀兩臂亦更互以手摩之使髮不白脉不浮外大洞真經精景按摩篇曰卧起當平氣正坐先兩手乃度以掩項後因即面視上使項與兩手爭為之三四使人精和血通風氣不能入久行之不死不病又屈動身體伸手四極反張宣搖百關各為之三又引消魔上靈經曰若體中不寧當反舌塞唯漱滿咽液無數須㬰不寧之痾自即除也亦覺身中寬軟又曰鼻亦得按其左右唯令無數也令人氣平所以灌溉中嶽名書帝録坐常欲閉目內視五藏腸胃久行之自得分明了了也常能手掩口鼻臨目微氣久許時手中生液遂以摩面目常行之令人體香真誥去櫛頭理髮欲得多過通血氣散風濕也數易櫛更香用之也亦可不須解髮太極經曰理髮欲向王地既櫛髮之始而微祝曰泥丸玄華保精長存左為隱月右為日根六合精錬百神受恩祝畢咽液三過能常行之髮不落而日生之當數易櫛櫛取多而不使痛亦可令侍者櫛取多也血液不滯髮根常堅也亦書玉訣下云太玄上宫北帝常以庚申日制又民三尸魂神條人罪狀上奏帝君當此日能修齊奉戒晝夜思神則三尸不得上天言人之罪地司奏人善功列言帝君太一歡喜即記姓名左契長為種民太上上宫至真尊神常以甲子日遣太一中臺大使者下周諸地諸天檢校神祗枝散雜俗鬼精又其日能齊燒香中臺大使者皆條善功奏上三天上帝即為除監天領地鬼神主書名玉曆長為真人北帝曲折祝真誥云風病之所生生於丘墳隂濕三泉壅滯是故地官以水氣相激多作風痺之疾重者舉體不授輕者半身或失手足也若常夢在東北及西北經接故居或見靈牀處所者正欲與冢氣相接也墓之東北為絶命西北為九厄此皆冢訟之凶地若見亡者於其間益其驗也若遇此夢者卧覺當正向上三啄齒而祝之曰太元上玄九都紫天理魂護命髙素真人我受上法受教泰玄長生久視身飛體仙塜墓永安鬼訟塞閒魂魄和恱惡氣不煙遊魅罔象敢干我神北帝打制收氣入淵得録上皇謹奏玉晨如此者再祝又三叩齒則不夢夢冢墓及家死鬼若常得惡夢不祥者皆可按此法於是鬼氣滅邪魅散形也又云手臂不擭者沈風毒氣在脉中結痾痺骨使人然也宜針灸則愈又宜按北帝曲折之祝若行之百過病亦消除也先以一手徐徐按摩疾臂良久畢乃暝目內視咽唾三過叩齒三通正心微祝曰太上四玄五華六庭三魂七魄天開地精神府營衛天胎上明四支百神九節萬靈受録玉晨刋書玉城玉童侍身玉里護命永齊一景飛仙上清長與日月年俱後傾超騰升仙得整太平流風結痾注鬼五飛魍魅塜氣隂氣相佪凌我四支干家盛衰太一天丁龍虎曜威斬鬼不祥風邪即摧考注匿訟百毒隱非使我復常日月同暉考注見犯北辰忮如干明上威昔唐覽居山為鬼所擊舉身不授如綿囊有道人教按此法皆即除之此北帝曲折之法諸疾有曲折者用此法皆佳不但風痺不授而巳唐覽今在華山合虹丹服得不死真人問曰凡人何故數有病手神人答曰故肝神去出遊不時還目無明也心神去不在其脣青白也肺神去不在其鼻不通也腎神去不在其耳聾也脾神去不在令人口不知甘也頭神去不在令人眴冥也腹神去不在令人中央甚不調無所能化也四肢神去令人不能自移也夫精神其性常居空間不居混濁欲思其神皆當齊戒懸象室中百病消亡不齊不戒精神不肯還反人也皆上天共訴人也所以人病積多死者不絶又云以兩手摩拭面目令小熱以為常每欲數也人之將老面皺者先從兩目下始也人之體衰氣少者先從兩腎間始也謂此二處皺衰之戶牖氣力之關津故起君常行此法以辟皺衰而氣力常保康和也靈寶天地運度經云靈寶自然運度有大陽九大百六也小陽九小百六也三千六百六十年為小陽九小百六也九千九百年為大陽九大百六夫天厄謂之陽九地虧謂之百六至金氏之後甲申之嵗是天地運度否泰所終陽九㑹至時道德方明凶醜頓釋聖君受任於壬辰之年也黃素四十四方經云常夜寢欲合眼時以手撫心三過閉目微祝曰太靈九宫太一守房百神參位魂魄和同長生不死塞滅邪凶祝畢而寢此名為九宮隱祝寢魂之法常能行之使人魂魄安寧常吉利也又耳鳴者外使入也耳神嬌女云宜即聲錘以聞九宮使知外人來入令備也聲鍾者是今耳鳴之音也其聞之者錯手掩耳而祝曰赤子在宫九真在房清聽神命亦察不祥太一流火以滅萬凶聖真仙品聖真仙各三合為九品九品又各有三合為二十七品玊清以聖為正位上清以真為正位太清以仙為正位至於聖亦稱真真亦稱聖仙亦稱真真亦稱仙仙亦稱聖聖亦稱仙一千年一聖五百年一真一百五十年一仙百年一賢也無上真人文始內傳云諸天神王散花燒香以供養得道之人也又云太上遺繡衣使者傳命與尹喜莊子秋水第十七篇云莊子與惠子遊於濠梁之上莊子曰倏魚出遊從容是魚樂也惠子曰子非魚安知魚之樂耶莊子曰子非我安知我不知魚之樂耶惠子曰我非子故不知子矣子固非魚也子之不知魚全矣莊子曰請循其本惠子曰汝安知魚樂云者既巳知吾知之而問我我知之濠上也方謙之字道沖冀州趙邦柏人縣人外身濟物山家多患山瘧寄名即斷人有請其方者謙之答曰心正可以治邪吾居貧無財可施常誦法輪道德經隨喜衆善慈悲衆惡知此可以自治亦能治他也神仙傳麻姑以米擲地視米墮地皆成丹砂王方平笑曰姑故年少也吾老耳了不喜復作此曹狡獪變化也孫博河東人有清才能屬文乃學道治墨子之術能使草木金石皆為火光照數里亦能使我身成炎火口中吐火指大樹生草皆枯焦更指之則復如故亦能使三軍之衆各成一聚火也每作火燒他人以水沃之經日不滅須博自指乃止也行大水中非但巳身不霑濡能使從者數百人皆不沾又能於水上布席坐飲食作樂使人舞水上不沒而盡勸有疾病者就恃自治亦無以云為直指之言愈即愈又能吞刀劔及從壁中出入引鏡為刀屈刀為鏡可精時不改須博指之乃復故形也後入林慮山中舍神丹而仙去矣叙术夫术乃辟塞邪津氣遏鬼路矣餐其丸餌則靈心四敷榮衛輕盈服其煎散則百疾瘳除可以長生久視也合术方不録南燭凶年無穀或窮不能得者皆單服南燭或和茯苓或以密和南燭或雜松柏葉也南燭草木搗取汁以掩青龍之稻米作藥服之其樹是木而似草故號曰南燭草木一名猴藥一名男讀一名後卓一名惟那木一名草木之王名山皆有吳越最多太真科中卷云天子邦畿有田千里供宗廟贍遐邇象曰月之遙故千里也號曰京師京大也師衆也天子所居大衆歸集也老君枕中開闔經云此生氣常當安隱某身勿得妄出也口是五災尸心是八毒門魁𩲃𩵄䰢魓𩳐魒凡書符先念三過部臨齧鱗書符於胡餅上密呪七遍前符真書每朝清旦叩齒二十四通持此呪三遍然後向東以茅香湯服符三丸呪曰皇靈之寶珍彌劫無衰朽精神常和同算命自長久堅存不暫虧能破諸殃咎真人祕此文慎終常如首急急一如太上老君口勑律令通靈真香法夫香者所以降靈通神傳言驛行導達往來表眀還近所以典香侍香玊童玉女香官使者專司其職不可輕也出三洞備鍊科流珠經云燒異域穢臭毒惡辛烈之香謂乳香螺甲香此犯道禁非真人常修行之香也真人愛紫微幽木之香聞者皆喜謂沈水箋香胡香辛烈毒惡真人惡之胡香謂乳香桐柏真人王子晉謂清虛真人王子登曰昔蘇上卿愛燒辛烈之香氣衝於中華天尊形像之前地府上奏太上惡之乃退減仙位神仙香譜云世人多以乳香供天夫乳香者一名胡香上帝與五星惡聞者蓋氣味辛烈薰穢故也螺甲麝臍尤為所忌沈香箋香降真香白檀香蘇合香青木香此香上衝四十里丁香安息香此香辟邪却穢龍腦只可用生者熟龍腦慮其木之氣間雜降真香珠法以沈水香三斤薰木香二斤青木香九兩雞舌香五兩烏參三兩雀頭香六兩香白茞二兩詹匐香二兩白檀二兩艾香三兩安息香四兩木蘭三兩凡十二物別搗篩罩內乾棗肉十兩搗三萬杵於白瓷器中蒸一日以白蜜三斤和令相得搗熟丸之如雞頭子太青線穿之曝令乾名曰三真九和香珠丸壇內燒之上徹九天天真玉女聞之降鑒於虛空之中出九天生神齊儀香油紳燭法洞神經香油法以沈水香九斤青桂皮三斤青木香十兩真檀十兩雞舌香八兩蘇合香八兩雀頭香十兩零陵香十八兩乾棗脂二十兩藿香十兩萱蘇六兩白茞八兩凡十二物先齊取平建開成日東向或南向銼絹襄之感降真靈出三洞道士修鍊科盛沈油中七日勿開若搗篩蜜和陽燧火燒神燭油法詹匐五兩薰陸三兩零陵香六兩甘松六兩白茅香三兩烏參三兩白茞三兩凡七物銼令細絹襄盛之沈油中三日或五日七日然後用之然鐙則靈香馥郁可以感降天真矣修香鐙之要必在綵籠罩之護蟲拒風而光延久爾齊壇燈燭之外蠟炬以多為佳不可闕也出九天生神儀香方新茅香二十兩淨擇去浮皮取淨十二兩細銼以蜜二兩同炒令黃香附子二兩銼丁香皮一兩半黃檀七兩細銼降真香一兩右搗令均碎錬好蜜二十四兩和揉勻以瓷器盛埋隂地三二尺十日外取用每料用蜜拌和訖入箋香粗末三兩清還香方甘松十兩香白芷三十兩玄參五兩零陵香六兩茅香七兩丁香皮五兩蒮香三兩香附子三兩木麝半斤降真香五兩右件淨洗銼㬠搗為蠱末錬蜜和之垍器盛之久窨三洞樞機雜說
